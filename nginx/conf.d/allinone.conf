# Nginx configuration for All-in-One EasyPost Container
# This config assumes all services (FastAPI, MCP) are running on localhost

# Upstream definitions
upstream backend_app {
    server 127.0.0.1:8000;
}

upstream mcp_app {
    server 127.0.0.1:9000;
}

# HTTP server
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    # Health check endpoint for AWS/Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API Proxy
    location /api/ {
        proxy_pass http://backend_app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend_app/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # MCP Server
    location /mcp/ {
        proxy_pass http://mcp_app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Media files
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Root / Frontend (if served from here)
    location / {
        root /usr/share/nginx/html/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
