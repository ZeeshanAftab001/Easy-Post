# Updated docker-compose.yml for using pre-built Docker Hub images
# Usage: docker-compose -f docker-compose.hub.yml up -d

version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: easypost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easypost}
      POSTGRES_USER: ${POSTGRES_USER:-easypost_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easypost_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easypost-network

  redis:
    image: redis:7-alpine
    container_name: easypost-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easypost-network

  waha:
    image: devlikeapro/waha:latest
    container_name: easypost-waha
    restart: unless-stopped
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-waha_secret_key}
      - WAHA_DEFAULT_SESSION=${WAHA_SESSION:-easypost_session}
      - WAHA_ENGINE=${WAHA_ENGINE:-WEBJS}
      - WAHA_START_SESSION=${WAHA_START_SESSION:-true}
      - WAHA_RESTART_SESSION_ON_TEARDOWN=${WAHA_RESTART_SESSION:-true}
      - WAHA_DEBUG=${WAHA_DEBUG:-false}
      - WAHA_HOST=${WAHA_HOST:-0.0.0.0}
      - WAHA_PORT=${WAHA_PORT:-8080}
    volumes:
      - waha_data:/app/.waha
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network

  # Using Docker Hub image for backend
  backend:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-backend:latest
    container_name: easypost-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      waha:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      WAHA_URL: http://waha:8080
      WAHA_API_KEY: ${WAHA_API_KEY:-waha_secret_key}
      WAHA_SESSION: ${WAHA_SESSION:-easypost_session}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-32_byte_key_change_this}
      API_KEY: ${API_KEY:-api_key_change_me}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEW_RELIC_KEY: ${NEW_RELIC_KEY:-}
      MCP_SERVER_URL: http://mcp-server:9000
    volumes:
      - media_uploads:/app/media
      - static_files:/app/static
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network

  mcp-server:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-mcp-server:latest
    container_name: easypost-mcp
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      MCP_PORT: ${MCP_PORT:-9000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - mcp_data:/app/data
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network

  # Using Docker Hub image for frontend
  frontend:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-frontend:latest
    container_name: easypost-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      VITE_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      VITE_ENVIRONMENT: ${ENVIRONMENT:-production}
      VITE_APP_NAME: ${VITE_APP_NAME:-EasyPost AI}
      VITE_DEBUG: ${DEBUG:-false}
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - mcp-server
    networks:
      - easypost-network

  # Using Docker Hub image for nginx
  nginx:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-nginx:latest
    container_name: easypost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/usr/share/nginx/html/static
      - media_uploads:/usr/share/nginx/html/media
    depends_on:
      - backend
      - frontend
      - mcp-server
    networks:
      - easypost-network

  # Celery worker
  celery-worker:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-backend:latest
    container_name: easypost-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      WAHA_URL: http://waha:8080
      WAHA_API_KEY: ${WAHA_API_KEY:-waha_secret_key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - easypost-network
    command: celery -A app.tasks worker --loglevel=info --concurrency=4

  # Celery beat scheduler
  celery-beat:
    image: ${DOCKER_HUB_USERNAME:-zeeshanaabbasi}/easypost-backend:latest
    container_name: easypost-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    depends_on:
      - postgres
      - redis
      - celery-worker
    networks:
      - easypost-network
    command: celery -A app.tasks beat --loglevel=info

networks:
  easypost-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  waha_data:
    driver: local
  media_uploads:
    driver: local
  static_files:
    driver: local
  mcp_data:
    driver: local
