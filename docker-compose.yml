version: '3.9'

services:
  # ============================================
  # 📦 PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: easypost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easypost}
      POSTGRES_USER: ${POSTGRES_USER:-easypost_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easypost_admin} -d ${POSTGRES_DB:-easypost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 🔄 Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: easypost-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 🤖 WAHA (WhatsApp HTTP API)
  # ============================================
  waha:
    image: devlikeapro/waha:latest
    container_name: easypost-waha
    restart: unless-stopped
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-waha_secret_key}
      - WAHA_DEFAULT_SESSION=${WAHA_SESSION:-easypost_session}
      - WAHA_ENGINE=${WAHA_ENGINE:-WEBJS}
      - WAHA_START_SESSION=${WAHA_START_SESSION:-true}
      - WAHA_RESTART_SESSION_ON_TEARDOWN=${WAHA_RESTART_SESSION:-true}
      - WAHA_DEBUG=${WAHA_DEBUG:-false}
      - WAHA_HOST=${WAHA_HOST:-0.0.0.0}
      - WAHA_PORT=${WAHA_PORT:-8080}
    volumes:
      - waha_data:/app/.waha
      - ./waha-sessions:/app/.waha/sessions
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 🚀 Backend API (FastAPI + LangGraph)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: easypost-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      waha:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      
      # WhatsApp
      WAHA_URL: http://waha:8080
      WAHA_API_KEY: ${WAHA_API_KEY:-waha_secret_key}
      WAHA_SESSION: ${WAHA_SESSION:-easypost_session}
      
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      
      # Clerk Auth
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-32_byte_key_change_this}
      API_KEY: ${API_KEY:-api_key_change_me}
      
      # App Config
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEW_RELIC_KEY: ${NEW_RELIC_KEY:-}
      
      # MCP Server
      MCP_SERVER_URL: http://mcp-server:9000
      
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - media_uploads:/app/media
      - static_files:/app/static
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c "
        python -m alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ============================================
  # ⚙️ MCP Tool Server
  # ============================================
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: easypost-mcp
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      MCP_PORT: ${MCP_PORT:-9000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./mcp-server:/app
      - /app/__pycache__
      - mcp_data:/app/data
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 🎨 Frontend (React + Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: easypost-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      VITE_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      VITE_ENVIRONMENT: ${ENVIRONMENT:-development}
      VITE_APP_NAME: ${VITE_APP_NAME:-EasyPost AI}
      VITE_DEBUG: ${DEBUG:-true}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - mcp-server
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ============================================
  # 🐘 Nginx (Reverse Proxy & Load Balancer)
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: easypost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/usr/share/nginx/html/static
      - media_uploads:/usr/share/nginx/html/media
      - ./frontend/dist:/usr/share/nginx/html/app
    depends_on:
      - backend
      - frontend
      - mcp-server
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # 🛠️ Celery Worker (Background Tasks)
  # ============================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easypost-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      WAHA_URL: http://waha:8080
      WAHA_API_KEY: ${WAHA_API_KEY:-waha_secret_key}
    volumes:
      - ./backend:/app
      - media_uploads:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: celery -A app.tasks worker --loglevel=info --concurrency=4

  # ============================================
  # 📊 Celery Beat (Scheduler)
  # ============================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easypost-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - celery-worker
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: celery -A app.tasks beat --loglevel=info

  # ============================================
  # 🔍 Prometheus (Metrics Collection)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: easypost-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 📊 Grafana (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: easypost-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - easypost-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# 📦 Volumes for Persistent Data
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  waha_data:
    driver: local
  media_uploads:
    driver: local
  static_files:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  mcp_data:
    driver: local

# ============================================
# 🌐 Networks
# ============================================
networks:
  easypost-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16