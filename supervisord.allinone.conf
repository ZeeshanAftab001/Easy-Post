[supervisord]
nodaemon=true
logfile=/home/appuser/app/logs/supervisord.log
pidfile=/home/appuser/app/supervisord.pid
user=appuser

[unix_http_server]
file=/home/appuser/app/supervisor.sock

[supervisorctl]
serverurl=unix:///home/appuser/app/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ============================================
# FastAPI Backend - Uvicorn
# ============================================
[program:uvicorn]
directory=/home/appuser/app/backend
command=/home/appuser/.local/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
autostart=true
autorestart=true
stderr_logfile=/home/appuser/app/logs/uvicorn.err.log
stdout_logfile=/home/appuser/app/logs/uvicorn.out.log
priority=999

# ============================================
# Celery Worker
# ============================================
[program:celery-worker]
directory=/home/appuser/app/backend
command=/home/appuser/.local/bin/celery -A app.core.celery_app worker --loglevel=info --concurrency=4 --queues=default,priority
autostart=true
autorestart=true
stderr_logfile=/home/appuser/app/logs/celery-worker.err.log
stdout_logfile=/home/appuser/app/logs/celery-worker.out.log
priority=998

# ============================================
# Celery Beat - Scheduler
# ============================================
[program:celery-beat]
directory=/home/appuser/app/backend
command=/home/appuser/.local/bin/celery -A app.core.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
autostart=true
autorestart=true
stderr_logfile=/home/appuser/app/logs/celery-beat.err.log
stdout_logfile=/home/appuser/app/logs/celery-beat.out.log
priority=997

# ============================================
# MCP Server
# ============================================
[program:mcp-server]
directory=/home/appuser/app/mcp-server
command=/home/appuser/.local/bin/uvicorn server:app --host 0.0.0.0 --port 9000 --workers 2
autostart=true
autorestart=true
stderr_logfile=/home/appuser/app/logs/mcp-server.err.log
stdout_logfile=/home/appuser/app/logs/mcp-server.out.log
priority=996

# ============================================
# Nginx - Reverse Proxy
# ============================================
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/home/appuser/app/logs/nginx.err.log
stdout_logfile=/home/appuser/app/logs/nginx.out.log
priority=995

# ============================================
# Process Groups
# ============================================
[group:web]
programs=nginx,uvicorn,mcp-server

[group:tasks]
programs=celery-worker,celery-beat
