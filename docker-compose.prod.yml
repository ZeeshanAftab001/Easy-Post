# EasyPost Production Stack (Backend Only)
version: '3.9'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easypost}
      POSTGRES_USER: ${POSTGRES_USER:-easypost_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - easypost-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - easypost-network

  waha:
    image: devlikeapro/waha:latest
    restart: always
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
    volumes:
      - waha_data:/app/.waha
    networks:
      - easypost-network

  # Application Core
  backend:
    image: zeeshanaftababbasi/easypost-backend:latest
    restart: always
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easypost_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-easypost}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WAHA_URL: http://waha:8080
    networks:
      - easypost-network

  celery-worker:
    image: zeeshanaftababbasi/easypost-backend:latest
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - backend
    env_file: .env
    networks:
      - easypost-network

  celery-beat:
    image: zeeshanaftababbasi/easypost-backend:latest
    restart: always
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      - redis
      - backend
    env_file: .env
    networks:
      - easypost-network

  mcp-server:
    image: zeeshanaftababbasi/easypost-mcp:latest
    restart: always
    env_file: .env
    networks:
      - easypost-network

  nginx:
    image: zeeshanaftababbasi/easypost-nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/usr/share/nginx/html/static
      - media_uploads:/usr/share/nginx/html/media
    depends_on:
      - backend
      - mcp-server
    networks:
      - easypost-network

networks:
  easypost-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  waha_data:
  static_files:
  media_uploads:
